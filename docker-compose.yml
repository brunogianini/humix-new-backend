version: '3.9'

# Only PostgreSQL — no Redis, no cache layer
services:
  postgres:
    image: postgres:16-alpine
    container_name: humix_postgres
    environment:
      POSTGRES_USER: humix
      POSTGRES_PASSWORD: humix
      POSTGRES_DB: humix
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U humix']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
